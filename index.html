<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>まちづくりチャレンジ事業 審査アプリ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d9dee7;
      --text: #1e2530;
      --muted: #697385;
      --brand: #1f7a68;
      --brand-dark: #146052;
      --accent: #b94f2f;
      --soft: #eef6f3;
      --warn: #fff4dd;
      --shadow: 0 10px 24px rgba(31, 42, 55, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      background: #ffffff;
      border-right: 1px solid var(--line);
      padding: 22px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: grid;
      gap: 6px;
      margin-bottom: 22px;
    }

    .brand h1 {
      font-size: 20px;
      line-height: 1.35;
      margin: 0;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 16px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    select, input[type="text"], input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 11px;
      color: var(--text);
      min-height: 42px;
    }

    input[type="number"] {
      text-align: center;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 11px;
      color: var(--text);
      resize: vertical;
      line-height: 1.6;
      font: inherit;
    }

    .nav {
      display: grid;
      gap: 8px;
      margin: 20px 0;
    }

    .nav button {
      text-align: left;
      padding: 11px 12px;
      border-radius: 8px;
      color: var(--text);
      background: transparent;
      border: 1px solid transparent;
      font-weight: 700;
    }

    .nav button.active {
      background: var(--soft);
      color: var(--brand-dark);
      border-color: #c8e1d9;
    }

    .side-note {
      background: var(--warn);
      border: 1px solid #f2d491;
      border-radius: 8px;
      padding: 12px;
      color: #6d5015;
      font-size: 13px;
      line-height: 1.55;
    }

    .logout-btn {
      width: 100%;
      justify-content: center;
      margin-top: 12px;
    }

    main {
      padding: 26px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .page-title h2 {
      margin: 0 0 6px;
      font-size: 26px;
      letter-spacing: 0;
    }

    .page-title p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      min-height: 40px;
      padding: 9px 13px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn.secondary {
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
    }

    .btn.edit {
      color: #4d3600;
      background: #ffd45a;
      border: 1px solid #e4b93b;
    }

    .btn.danger {
      background: var(--accent);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .stat b {
      display: block;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 18px;
    }

    .panel-body {
      padding: 16px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .group-grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .group-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 10px;
      background: #fff;
    }

    .group-card header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
      color: var(--brand-dark);
      background: var(--soft);
      border: 1px solid #c8e1d9;
      white-space: nowrap;
    }

    .pill.start {
      color: #1d5579;
      background: #e7f3fb;
      border-color: #add5ee;
    }

    .pill.general {
      color: #73520c;
      background: #fff3cf;
      border-color: #edcf7d;
    }

    .pill.collab {
      color: #6e3b68;
      background: #f7e9f6;
      border-color: #deb6da;
    }

    .score-state {
      color: var(--muted);
      font-size: 13px;
    }

    .score-state.done {
      color: var(--brand-dark);
      font-weight: 700;
    }

    .score-form {
      display: grid;
      gap: 6px;
    }

    .criteria-row {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 14px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .criteria-row strong {
      display: block;
      margin-bottom: 4px;
    }

    .criteria-row span {
      color: var(--muted);
      font-size: 13px;
    }

    .score-form .criteria-row {
      grid-template-columns: minmax(0, 1fr) 92px;
      gap: 8px;
      padding: 5px 8px;
    }

    .score-form .criteria-row strong,
    .score-form .criteria-row span {
      display: inline;
      margin: 0;
      font-size: 14px;
    }

    .score-form .criteria-row span::before {
      content: "（";
    }

    .score-form .criteria-row span::after {
      content: "）";
    }

    .score-form input[type="number"] {
      min-height: 30px;
      padding: 4px 7px;
    }

    .score-form textarea {
      min-height: 48px;
    }

    #scoreModal {
      align-items: start;
      padding: 8px;
    }

    #scoreModal .modal {
      max-height: calc(100vh - 16px);
    }

    #scoreModal .panel-head {
      padding: 8px 12px;
    }

    #scoreModal .panel-head h3 {
      font-size: 16px;
    }

    #scoreModal .panel-body {
      padding: 8px 12px;
    }

    #scoreModal .field {
      gap: 4px;
      margin-bottom: 2px;
    }

    #scoreModal .actions {
      gap: 8px;
      margin-top: 2px;
    }

    #scoreModal .btn {
      min-height: 32px;
      padding: 6px 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 13px;
      background: #fbfcfd;
    }

    td.number, th.number {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .rank {
      width: 44px;
      height: 32px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--brand-dark);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .hidden {
      display: none !important;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 28px 12px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(18, 24, 33, .48);
      display: grid;
      place-items: center;
      padding: 18px;
      z-index: 10;
    }

    .modal {
      width: min(760px, 100%);
      max-height: 96vh;
      overflow: auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, .24);
      border: 1px solid var(--line);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #17202d;
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: .2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }


    .auth-lock {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
    }

    .auth-card {
      width: min(440px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 12px;
    }

    .auth-card h1 {
      margin: 0;
      font-size: 22px;
    }

    .auth-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .judge-lock {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
    }

    .judge-card {
      width: min(460px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .judge-card h1 {
      margin: 0;
      font-size: 22px;
    }

    .judge-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .judge-display {
      min-height: 42px;
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 10px 11px;
      font-weight: 700;
    }

    .admin-judge-select {
      margin-top: 8px;
    }

    @media (max-width: 860px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        padding: 18px;
      }

      .topbar {
        display: grid;
      }

      .actions {
        justify-content: flex-start;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .criteria-row {
        grid-template-columns: 1fr;
      }

      .score-form .criteria-row {
        grid-template-columns: minmax(0, 1fr) 86px;
      }
    }

    @media (max-width: 560px) {
      .stats {
        grid-template-columns: 1fr;
      }

      th, td {
        padding: 9px 7px;
        font-size: 13px;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="auth-lock" id="authLock">
    <div class="auth-card">
      <h1>まちづくりチャレンジ事業</h1>
      <p>審査アプリにログインします。</p>
      <form class="grid" id="loginForm">
        <div class="field">
          <label for="passcodeInput">パスコード</label>
          <input type="password" id="passcodeInput" autocomplete="current-password" placeholder="パスコードを入力">
        </div>
        <p id="authMessage">事務局用または審査員用のパスコードを入力してください。</p>
        <button class="btn" type="submit" id="loginBtn">ログイン</button>
      </form>
    </div>
  </div>

  <div class="judge-lock hidden" id="judgeLock">
    <div class="judge-card">
      <h1>審査員選択</h1>
      <p>この端末で入力する審査員を選んでください。</p>
      <div class="field">
        <label for="entryJudgeSelect">審査員</label>
        <select id="entryJudgeSelect"></select>
      </div>
      <button class="btn" id="enterAppBtn">この審査員で始める</button>
      <button class="btn secondary" id="entryLogoutBtn">パスコードからやり直す</button>
    </div>
  </div>

  <div class="app-shell hidden" id="appShell">
    <aside class="sidebar">
      <div class="brand">
        <h1>まちづくりチャレンジ事業<br>審査アプリ</h1>
        <p>17団体・5名審査員・3部門対応</p>
      </div>

      <div class="field">
        <label>審査員</label>
        <div class="judge-display" id="judgeDisplay">未選択</div>
        <select class="admin-judge-select hidden" id="adminJudgeSelect" data-admin-only="true" aria-label="事務局用 審査員切り替え"></select>
      </div>

      <nav class="nav" id="mainNav" aria-label="画面切り替え">
        <button class="active" data-view="review">審査入力</button>
        <button data-view="ranking" data-admin-only="true">集計ランキング</button>
        <button data-view="details" data-admin-only="true">審査明細</button>
        <button data-view="groups" data-admin-only="true">団体設定</button>
        <button data-view="criteria" data-admin-only="true">審査項目設定</button>
        <button data-view="judges" data-admin-only="true">審査員設定</button>
      </nav>

      <div class="side-note" id="storageNote">
        入力した点数はGoogle Sheetsに保存されます。再度同じ団体を開くと、審査内容を修正できます。
      </div>
      <button class="btn secondary logout-btn" id="logoutBtn">ログアウト</button>
    </aside>

    <main>
      <section class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">審査入力</h2>
          <p id="pageLead">団体を選び、審査員ごとに点数を入力します。</p>
        </div>
        <div class="actions" data-admin-only="true">
          <button class="btn secondary" id="exportBtn">CSV出力</button>
          <button class="btn secondary" id="exportDivisionRankingBtn">部門別順位表CSV</button>
          <button class="btn secondary" id="resetScoresBtn">審査点数のみ初期化</button>
          <button class="btn danger" id="resetBtn">全データ初期化</button>
        </div>
      </section>

      <section class="stats" id="stats" data-admin-only="true"></section>

      <section class="panel" id="reviewView">
        <div class="panel-head">
          <h3>審査する団体</h3>
          <select id="divisionFilter" aria-label="部門で絞り込み">
            <option value="all">すべての部門</option>
            <option value="start">スタート部門</option>
            <option value="general">一般部門</option>
            <option value="collab">団体連携部門</option>
          </select>
        </div>
        <div class="panel-body">
          <div class="grid group-grid" id="groupCards"></div>
        </div>
      </section>

      <section class="panel hidden" id="rankingView">
        <div class="panel-head">
          <h3>点数順</h3>
          <select id="rankingFilter" aria-label="ランキング部門">
            <option value="all">すべての部門</option>
            <option value="start">スタート部門</option>
            <option value="general">一般部門</option>
            <option value="collab">団体連携部門</option>
          </select>
        </div>
        <div class="panel-body">
          <table>
            <thead>
              <tr id="rankingHeaderRow"></tr>
            </thead>
            <tbody id="rankingBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel hidden" id="detailsView">
        <div class="panel-head">
          <h3>審査員別 評価点数</h3>
          <select id="detailsFilter" aria-label="明細部門">
            <option value="all">すべての部門</option>
            <option value="start">スタート部門</option>
            <option value="general">一般部門</option>
            <option value="collab">団体連携部門</option>
          </select>
        </div>
        <div class="panel-body">
          <table>
            <thead>
              <tr>
                <th>団体名</th>
                <th>部門</th>
                <th>審査員</th>
                <th class="number">公益性</th>
                <th class="number">2</th>
                <th class="number">3</th>
                <th class="number">4</th>
                <th class="number">5</th>
                <th class="number">6</th>
                <th class="number">合計点</th>
                <th>メモ</th>
              </tr>
            </thead>
            <tbody id="detailsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel hidden" id="groupsView">
        <div class="panel-head">
          <h3>団体設定</h3>
          <button class="btn" id="saveGroupsBtn" data-save-button="true">保存</button>
        </div>
        <div class="panel-body">
          <div class="grid" id="groupSettings"></div>
        </div>
      </section>

      <section class="panel hidden" id="criteriaView">
        <div class="panel-head">
          <h3>審査項目設定</h3>
          <button class="btn" id="saveCriteriaBtn" data-save-button="true">保存</button>
        </div>
        <div class="panel-body">
          <div class="grid" id="criteriaSettings"></div>
        </div>
      </section>

      <section class="panel hidden" id="judgesView">
        <div class="panel-head">
          <h3>審査員設定</h3>
          <button class="btn" id="saveJudgesBtn" data-save-button="true">保存</button>
        </div>
        <div class="panel-body">
          <div class="grid" id="judgeSettings"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="scoreModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="panel-head">
        <div>
          <h3 id="modalTitle">審査入力</h3>
          <p id="modalMeta" style="margin: 6px 0 0; color: var(--muted);"></p>
        </div>
        <button class="btn secondary" id="closeModalBtn">閉じる</button>
      </div>
      <div class="panel-body">
        <form class="score-form" id="scoreForm"></form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script>
    const STORAGE_KEY = "machizukuri-review-app-v1";
    const SELECTED_JUDGE_KEY = "machizukuri-review-selected-judge";
    const SELECTED_JUDGE_SESSION_KEY = "machizukuri-review-selected-judge-session";
    const ACCESS_CODE_KEY = "machizukuri-review-access-code";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyljPgW-MMgWfwx3jBObU2eNuF_r8aFwFuSrtiAKX8s-Udi1LbwGHj4wzokPgNZePK1Wg/exec";
    const USE_GOOGLE_SHEETS = APPS_SCRIPT_URL.startsWith("https://");

    const divisions = {
      start: "スタート部門",
      general: "一般部門",
      collab: "団体連携部門"
    };

    const defaultCriteria = {
      start: ["公益性", "実現性", "発展性", "将来性", "事業費"],
      general: ["公益性", "協働性", "実現性", "発展性", "創造性", "費用対効果"],
      collab: ["公益性", "協働性", "実現性", "発展性", "創造性", "費用対効果"]
    };

    const defaultState = () => ({
      judges: ["審査員1", "審査員2", "審査員3", "審査員4", "審査員5"],
      selectedJudge: "審査員1",
      criteria: structuredClone(defaultCriteria),
      groups: Array.from({ length: 17 }, (_, i) => ({
        id: `group-${i + 1}`,
        name: `団体${i + 1}`,
        division: i < 6 ? "start" : i < 12 ? "general" : "collab"
      })),
      scores: {},
      memos: {}
    });

    let state = defaultState();
    let currentView = "review";
    let activeGroupId = null;
    let appRole = "judge";
    let isAuthenticated = false;
    let isSaving = false;
    let refreshTimerId = null;

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    function normalizeState(rawState) {
      const fallback = defaultState();
      const localJudge = sessionStorage.getItem(SELECTED_JUDGE_SESSION_KEY) || localStorage.getItem(SELECTED_JUDGE_KEY);
      const nextState = {
        ...fallback,
        ...rawState,
        criteria: { ...fallback.criteria, ...(rawState && rawState.criteria ? rawState.criteria : {}) },
        selectedJudge: localJudge || fallback.selectedJudge
      };
      if (!nextState.judges.includes(nextState.selectedJudge)) {
        nextState.selectedJudge = nextState.judges[0];
      }
      return nextState;
    }

    async function loadState(accessCode = getAccessCode()) {
      if (USE_GOOGLE_SHEETS) {
        const data = await jsonp(`${APPS_SCRIPT_URL}?action=state&passcode=${encodeURIComponent(accessCode)}`);
        if (data && data.error) {
          sessionStorage.removeItem(ACCESS_CODE_KEY);
          throw new Error(data.error);
        }
        appRole = data.role || "judge";
        return normalizeState(data.state || data);
      }

      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return normalizeState(defaultState());
      try {
        return normalizeState(JSON.parse(raw));
      } catch {
        return normalizeState(defaultState());
      }
    }

    function saveState(options = {}) {
      localStorage.setItem(SELECTED_JUDGE_KEY, state.selectedJudge);
      sessionStorage.setItem(SELECTED_JUDGE_SESSION_KEY, state.selectedJudge);
      const sharedState = {
        judges: state.judges,
        criteria: state.criteria,
        groups: state.groups,
        scores: state.scores,
        memos: state.memos
      };
      if (USE_GOOGLE_SHEETS) {
        return postToAppsScript({
          mode: options.mode || "admin",
          changedKey: options.changedKey || "",
          deletedKey: options.deletedKey || "",
          state: sharedState
        });
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      return Promise.resolve();
    }

    function getAccessCode() {
      let code = sessionStorage.getItem(ACCESS_CODE_KEY);
      if (!code) {
        code = $("#passcodeInput").value.trim();
        if (!code) throw new Error("パスコードが入力されていません。");
        sessionStorage.setItem(ACCESS_CODE_KEY, code);
      }
      return code;
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `machizukuriCallback${Date.now()}${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement("script");
        const separator = url.includes("?") ? "&" : "?";
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Google Sheetsからデータを読み込めませんでした。"));
        }, 12000);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Google Apps Scriptに接続できませんでした。"));
        };
        script.src = `${url}${separator}callback=${callbackName}`;
        document.body.appendChild(script);
      });
    }

    function postToAppsScript(payload) {
      const body = new URLSearchParams();
      body.set("payload", JSON.stringify(payload));
      body.set("passcode", getAccessCode());

      return fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
        },
        body
      }).then(() => {
        // Apps Script cross-origin POST responses are opaque in no-cors mode.
        // Reloading shortly after save lets the sheet become the source of truth.
        if (USE_GOOGLE_SHEETS) {
          window.setTimeout(() => {
            refreshSharedState().catch(() => {});
          }, 900);
        }
      });
    }

    function scoreKey(groupId, judge) {
      return `${groupId}::${judge}`;
    }

    function getScores(groupId, judge) {
      const group = state.groups.find((item) => item.id === groupId);
      const scores = state.scores[scoreKey(groupId, judge)] || null;
      if (!group || !scores) return scores;
      return scores.slice(0, state.criteria[group.division].length);
    }

    function getMemo(groupId, judge) {
      return state.memos[scoreKey(groupId, judge)] || "";
    }

    function getWeightedScoreTotal(group, scores) {
      if (!group || !scores) return 0;
      const criteria = state.criteria[group.division] || [];
      return scores.slice(0, criteria.length).reduce((sum, score, index) => {
        const value = Number(score || 0);
        const isPublicBenefit = criteria[index] === "公益性";
        return sum + (isPublicBenefit && value >= 4 ? value * 2 : value);
      }, 0);
    }

    function getGroupTotal(groupId) {
      const group = state.groups.find((item) => item.id === groupId);
      return Object.entries(state.scores)
        .filter(([key]) => key.startsWith(`${groupId}::`))
        .reduce((sum, [, values]) => sum + getWeightedScoreTotal(group, values), 0);
    }

    function getReviewedCount(groupId) {
      return Object.keys(state.scores).filter((key) => key.startsWith(`${groupId}::`)).length;
    }

    function getMaxScore(group) {
      return group.division === "start" ? 300 : 350;
    }

    function getScoreRate(group, total) {
      const maxScore = getMaxScore(group);
      return maxScore ? total / maxScore : 0;
    }

    function formatPercent(value) {
      return `${(value * 100).toFixed(1)}%`;
    }

    function renderRanking() {
      const filter = $("#rankingFilter").value;
      const rows = state.groups
        .filter((group) => filter === "all" || group.division === filter)
        .map((group) => {
          const total = getGroupTotal(group.id);
          const reviewed = getReviewedCount(group.id);
          const average = reviewed ? (total / reviewed).toFixed(1) : "0.0";
          const scoreRate = getScoreRate(group, total);
          const judgeTotals = state.judges.map((judge) => {
            const scores = getScores(group.id, judge);
            return scores ? getWeightedScoreTotal(group, scores) : "";
          });
          return { group, total, reviewed, average, scoreRate, judgeTotals };
        })
        .sort((a, b) => b.total - a.total || b.scoreRate - a.scoreRate || Number(b.average) - Number(a.average) || a.group.name.localeCompare(b.group.name, "ja"));

      $("#rankingHeaderRow").innerHTML = `

    }

    function renderDetails() {
      const filter = $("#detailsFilter").value;
      const rows = state.groups
        .filter((group) => filter === "all" || group.division === filter)
        .flatMap((group) => {
          const criteria = state.criteria[group.division] || [];

            const scores = getScores(group.id, judge);

      $("#detailsBody").innerHTML = rows.map((row) => `

            const criterion = row.criteria[index] || "";

            const display = rawScore === undefined || rawScore === "" ? "" : rawScore;
            const weighted = criterion === "公益性" && Number(rawScore) >= 4 ? `${display}→${Number(rawScore) * 2}` : display;
            return `<td class="number" title="${escapeAttr(criterion)}">${weighted}</td>`;

    function openScoreModal(groupId) {
      activeGroupId = groupId;
      const group = state.groups.find((item) => item.id === groupId);
      const savedScores = getScores(groupId, state.selectedJudge) || [];
      const savedMemo = getMemo(groupId, state.selectedJudge);
      $("#modalTitle").textContent = group.name;
      $("#modalMeta").textContent = `${divisions[group.division]} / ${state.selectedJudge}`;
      $("#scoreForm").innerHTML = state.criteria[group.division].map((criterion, index) => `

        </div>
      `).join("") + `
        <div class="field">
          <label for="scoreMemo">メモ</label>
          <textarea id="scoreMemo" placeholder="審査時の気づき、確認事項、コメントなどを入力できます。">${escapeHtml(savedMemo)}</textarea>
        </div>
        <div class="actions">
          <button class="btn secondary" type="button" id="deleteScoreBtn">この審査を削除</button>
          <button class="btn" type="submit" data-save-button="true">保存</button>
        </div>
      `;
      $("#deleteScoreBtn").classList.toggle("hidden", !savedScores.length);
      $("#deleteScoreBtn").addEventListener("click", () => deleteActiveScore().catch((error) => showToast(error.message)));
      $("#scoreModal").classList.remove("hidden");

      if (firstInput) firstInput.focus();
    }

    function closeScoreModal() {
      activeGroupId = null;
      $("#scoreModal").classList.add("hidden");
    }

    async function saveActiveScore(event) {
      event.preventDefault();
      if (!activeGroupId) return;

      const values = $$("[data-score-index]").map((input) => {
        const value = Number(input.value);
        if (!Number.isInteger(value) || value < 1 || value > 10) {
          throw new Error("点数は1から10の整数で入力してください。");
        }
        return value;
      });

      state.scores[scoreKey(activeGroupId, state.selectedJudge)] = values;
      state.memos[scoreKey(activeGroupId, state.selectedJudge)] = $("#scoreMemo").value.trim();
      setSaving(true);
      try {
        await saveState({ mode: "score", changedKey: scoreKey(activeGroupId, state.selectedJudge) });
        closeScoreModal();
        render();
        showToast("審査点とメモを保存しました。");
      } finally {
        setSaving(false);
      }
    }

    async function deleteActiveScore() {
      if (!activeGroupId) return;
      if (!confirm("この審査員の点数を削除しますか？")) return;
      delete state.scores[scoreKey(activeGroupId, state.selectedJudge)];
      delete state.memos[scoreKey(activeGroupId, state.selectedJudge)];
      setSaving(true, "削除中...");
      try {
        await saveState({ mode: "score", deletedKey: scoreKey(activeGroupId, state.selectedJudge) });
        closeScoreModal();
        render();
        showToast("審査点を削除しました。");
      } finally {
        setSaving(false);
      }
    }

    async function saveGroupSettings() {
      state.groups = state.groups.map((group) => {
        const name = $(`[data-group-name="${group.id}"]`).value.trim() || group.name;
        const division = $(`[data-group-division="${group.id}"]`).value;
        return { ...group, name, division };
      });
      setSaving(true);
      try {
        await saveState();
        render();
        showToast("団体設定を保存しました。");
      } finally {
        setSaving(false);
      }
    }

    async function saveCriteriaSettings() {
      Object.keys(state.criteria).forEach((division) => {
        state.criteria[division] = state.criteria[division].map((oldValue, index) => {
          const value = $(`[data-criterion="${division}:${index}"]`).value.trim();
          return value || oldValue;
        });
      });
      setSaving(true);
      try {
        await saveState();
        render();
        showToast("審査項目を保存しました。");
      } finally {
        setSaving(false);
      }
    }

    async function saveJudgeSettings() {
      const oldJudges = [...state.judges];
      const newJudges = oldJudges.map((oldJudge, index) => {
        const value = $(`[data-judge-index="${index}"]`).value.trim();
        return value || oldJudge;
      });
      if (new Set(newJudges).size !== newJudges.length) {
        throw new Error("審査員名が重複しています。別々の名前にしてください。");
      }

      const renameKeys = (records) => {
        const renamed = {};
        Object.entries(records).forEach(([key, value]) => {
          const [groupId, judge] = key.split("::");
          const judgeIndex = oldJudges.indexOf(judge);
          const nextJudge = judgeIndex >= 0 ? newJudges[judgeIndex] : judge;
          renamed[scoreKey(groupId, nextJudge)] = value;
        });
        return renamed;
      };

      const selectedIndex = oldJudges.indexOf(state.selectedJudge);
      state.judges = newJudges;
      state.scores = renameKeys(state.scores);
      state.memos = renameKeys(state.memos);
      state.selectedJudge = selectedIndex >= 0 ? newJudges[selectedIndex] : newJudges[0];
      localStorage.setItem(SELECTED_JUDGE_KEY, state.selectedJudge);
      sessionStorage.setItem(SELECTED_JUDGE_SESSION_KEY, state.selectedJudge);
      setSaving(true);
      try {
        await saveState();
        render();
        showToast("審査員名を保存しました。");
      } finally {
        setSaving(false);
      }
    }

          const judgeTotals = state.judges.map((judge) => {
            const scores = getScores(group.id, judge);
            return scores ? getWeightedScoreTotal(group, scores) : "";
          });
          const judgeMemos = state.judges.map((judge) => getMemo(group.id, judge));
          return { group, total, average, reviewed, scoreRate, judgeTotals, judgeMemos };
        })
        .sort((a, b) => b.total - a.total || b.scoreRate - a.scoreRate || Number(b.average) - Number(a.average) || a.group.name.localeCompare(b.group.name, "ja"))
        .map((row, index) => [
          index + 1,
          row.group.name,
          divisions[row.group.division],
          formatPercent(row.scoreRate),
          row.average,
          ...row.judgeTotals,
          row.total,

          ...row.judgeMemos
        ]);

      const csv = [header, ...rows].map((row) => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "machizukuri-shinsa-ranking.csv";

    function exportDivisionRankingCsv() {
      const rows = [];
      Object.entries(divisions).forEach(([division, label], divisionIndex) => {
        const rankedRows = state.groups
          .filter((group) => group.division === division)
          .map((group) => {
            const total = getGroupTotal(group.id);
            const reviewed = getReviewedCount(group.id);
            const average = reviewed ? (total / reviewed).toFixed(1) : "0.0";
            const scoreRate = getScoreRate(group, total);
            return { group, total, reviewed, average, scoreRate };
          })
          .sort((a, b) => b.total - a.total || b.scoreRate - a.scoreRate || Number(b.average) - Number(a.average) || a.group.name.localeCompare(b.group.name, "ja"));

        if (divisionIndex > 0) rows.push([]);
        rows.push([label]);
        rows.push(["順位", "団体名", "獲得得点の割合", "平均点", ...state.judges.map((judge) => `${judge} 点数`), "合計点", "審査済数"]);
        rankedRows.forEach((row, index) => {
          const judgeTotals = state.judges.map((judge) => {
            const scores = getScores(row.group.id, judge);
            return scores ? getWeightedScoreTotal(row.group, scores) : "";
          });
          rows.push([
            index + 1,
            row.group.name,
            formatPercent(row.scoreRate),
            row.average,
            ...judgeTotals,
            row.total,
            `${row.reviewed}/${state.judges.length}`
          ]);
        });
      });

      const csv = rows.map((row) => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "machizukuri-shinsa-division-ranking.csv";
      link.click();
      URL.revokeObjectURL(url);
    }

    async function resetAll() {
      if (!confirm("団体設定・審査項目・点数をすべて初期化しますか？")) return;
      state = defaultState();
      setSaving(true, "初期化中...");
      try {
        await saveState();
        render();
        showToast("初期化しました。");
      } finally {
        setSaving(false);
      }
    }

    async function resetScoresOnly() {
      if (!confirm("審査点数とメモだけを初期化しますか？団体設定・審査項目・審査員名は残ります。")) return;
      state.scores = {};
      state.memos = {};
      setSaving(true, "初期化中...");
      try {
        await saveState();
        render();
        showToast("審査点数とメモを初期化しました。");
      } finally {
        setSaving(false);
      }
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    $$(".nav button").forEach((button) => {
      button.addEventListener("click", () => {
        currentView = button.dataset.view;
        render();
      });
    });

    $("#divisionFilter").addEventListener("change", renderGroupCards);
    $("#rankingFilter").addEventListener("change", renderRanking);
    $("#detailsFilter").addEventListener("change", renderDetails);
    $("#saveGroupsBtn").addEventListener("click", () => saveGroupSettings().catch((error) => showToast(error.message)));
    $("#saveCriteriaBtn").addEventListener("click", () => saveCriteriaSettings().catch((error) => showToast(error.message)));
    $("#saveJudgesBtn").addEventListener("click", () => saveJudgeSettings().catch((error) => showToast(error.message)));
    $("#scoreForm").addEventListener("submit", (event) => saveActiveScore(event).catch((error) => showToast(error.message)));
    $("#closeModalBtn").addEventListener("click", closeScoreModal);
    $("#scoreModal").addEventListener("click", (event) => {
      if (event.target.id === "scoreModal") closeScoreModal();
    });
    $("#exportBtn").addEventListener("click", exportCsv);
    $("#exportDivisionRankingBtn").addEventListener("click", exportDivisionRankingCsv);
    $("#resetScoresBtn").addEventListener("click", () => resetScoresOnly().catch((error) => showToast(error.message)));
    $("#resetBtn").addEventListener("click", () => resetAll().catch((error) => showToast(error.message)));
    $("#loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const code = $("#passcodeInput").value.trim();
      if (!code) {
        showAuthLock("パスコードを入力してください。");
        return;
      }
      $("#loginBtn").disabled = true;
      $("#loginBtn").textContent = "確認中...";
      try {
        sessionStorage.setItem(ACCESS_CODE_KEY, code);
        state = await loadState(code);
        if (appRole === "admin") {
          const selectedJudge = sessionStorage.getItem(SELECTED_JUDGE_SESSION_KEY) || localStorage.getItem(SELECTED_JUDGE_KEY);
          state.selectedJudge = state.judges.includes(selectedJudge) ? selectedJudge : state.judges[0];
          sessionStorage.setItem(SELECTED_JUDGE_SESSION_KEY, state.selectedJudge);
          localStorage.setItem(SELECTED_JUDGE_KEY, state.selectedJudge);
          showApp();
          render();
        } else {
          showJudgeLock();
        }
      } catch (error) {
        sessionStorage.removeItem(ACCESS_CODE_KEY);
        showAuthLock(error.message);
      } finally {
        $("#loginBtn").disabled = false;
        $("#loginBtn").textContent = "ログイン";
      }
    });
    $("#logoutBtn").addEventListener("click", logout);
    $("#entryLogoutBtn").addEventListener("click", logout);
    $("#adminJudgeSelect").addEventListener("change", (event) => {
      state.selectedJudge = event.target.value;
      localStorage.setItem(SELECTED_JUDGE_KEY, state.selectedJudge);
      sessionStorage.setItem(SELECTED_JUDGE_SESSION_KEY, state.selectedJudge);
      render();
    });
    $("#enterAppBtn").addEventListener("click", () => {
      const selectedJudge = $("#entryJudgeSelect").value;
      if (!selectedJudge) {
        showToast("審査員を選んでください。");
        return;
      }
      state.selectedJudge = selectedJudge;
      localStorage.setItem(SELECTED_JUDGE_KEY, selectedJudge);
      sessionStorage.setItem(SELECTED_JUDGE_SESSION_KEY, selectedJudge);
      showApp();
      render();
    });

    async function refreshSharedState() {
      if (!USE_GOOGLE_SHEETS || !$("#scoreModal").classList.contains("hidden")) return;
      if (currentView !== "review" && currentView !== "ranking") return;
      const selectedJudge = state.selectedJudge;
      state = await loadState();
      if (state.judges.includes(selectedJudge)) {
        state.selectedJudge = selectedJudge;
        localStorage.setItem(SELECTED_JUDGE_KEY, selectedJudge);
        sessionStorage.setItem(SELECTED_JUDGE_SESSION_KEY, selectedJudge);
      }
      render();
    }

    async function init() {
      if (!USE_GOOGLE_SHEETS) {
        $("#storageNote").textContent = "Google Apps ScriptのURLが未設定です。設定するまでは、このブラウザ内にだけ保存されます。";
      }
      const savedCode = sessionStorage.getItem(ACCESS_CODE_KEY);
      if (!savedCode) {
        showAuthLock();
        return;
      }
      $("#passcodeInput").value = savedCode;
      try {
        state = await loadState(savedCode);
      } catch (error) {
        sessionStorage.removeItem(ACCESS_CODE_KEY);
        showAuthLock(error.message);
        return;
      }

      const selectedJudge = sessionStorage.getItem(SELECTED_JUDGE_SESSION_KEY);
      if (appRole === "admin") {
        state.selectedJudge = state.judges.includes(selectedJudge) ? selectedJudge : state.judges[0];
        sessionStorage.setItem(SELECTED_JUDGE_SESSION_KEY, state.selectedJudge);
        localStorage.setItem(SELECTED_JUDGE_KEY, state.selectedJudge);
        showApp();
        render();
      } else if (selectedJudge && state.judges.includes(selectedJudge)) {
        state.selectedJudge = selectedJudge;
        showApp();
        render();
      } else {
        showJudgeLock();
      }
      if (USE_GOOGLE_SHEETS) {
        if (refreshTimerId) window.clearInterval(refreshTimerId);
        refreshTimerId = window.setInterval(() => {
          refreshSharedState().catch(() => {});
        }, 5000);
      }
    }

    init();
  </script>
</body>
</html>
